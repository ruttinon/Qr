<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Lookup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Device Lookup</h1>
        <div class="card">
            <h2>Manual Search</h2>
            <input id="serialInput" type="text" placeholder="Enter Serial Number" required>
            <button onclick="searchDevice()">Search</button>
        </div>
        <div class="card">
            <h2>OCR Scan</h2>
            <p>Take a photo of the device label to extract serial number.</p>
            <a href="scan.html" class="button-link">Go to Scan Page</a>
        </div>
        <div class="card">
            <h2>QR Code Scan</h2>
            <p>Scan a QR code that links to device information.</p>
        </div>
    </div>
    <script>
        function searchDevice() {
            const serial = document.getElementById('serialInput').value.trim();
            if (serial) {
                window.location.href = `device.html?serial=${encodeURIComponent(serial)}`;
            } else {
                alert('Please enter a serial number.');
            }
        }
    </script>
</body>
</html>
